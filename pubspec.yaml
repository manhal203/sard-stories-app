name: sard
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  any_image_view: ^2.1.0
  bloc: ^9.2.0
  carousel_slider: ^5.1.2
  curved_navigation_bar: ^1.0.6
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_hooks: ^0.21.3+1
  flutter_otp_text_field: ^1.5.1+1
  flutter_svg: ^2.2.4
  fpdart: ^1.2.0
  gap: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  get_it: ^9.2.1
  go_router: ^17.1.0
  lottie: ^3.3.2
  meta: ^1.17.0
  sizer: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/Logo_splash.PNG"

flutter:
  uses-material-design: true
  assets:
    - assets\images\
    - assets\animations\
    - assets\images\stories\
    - assets\images\avatar\
    - assets\data\stories.json
    - assets\data\author.json
    - assets\fonts\
  fonts:
    - family: Cairo
      fonts:
        - asset: assets\fonts\Cairo\Cairo-VariableFont_slnt,wght.ttf